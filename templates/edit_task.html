<!DOCTYPE html>
<html>
<head>
    <title>Edit Task</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <header class="main-header">
        <h1>Edit Task</h1>
        <button id="darkModeToggle" style="position:absolute; top:20px; right:20px;">🌙</button>
    </header>

    <main class="container">

        <form class="add-task-form" action="/updateTask/{{ task.id }}" method="POST">

            <select class="field-small" name="course_id">
                {% for c in courses %}
                <option value="{{ c.id }}"
                    {% if c.id == task.course_id %}selected{% endif %}>
                    {{ c.name }}
                </option>
                {% endfor %}
            </select>

            <input class="field-medium" type="text" name="title" value="{{ task.title }}"placeholder="Task title"  required>

            <input class="field-small" type="date" name="due_date" value="{{ task.due_date }}">

            <input class="field-tiny" type="number" step="0.01" min="0" max="100" name="weight" value="{{ task.weight }}" placeholder="Weight %">

            <select class="field-tiny" name="status">
                <option {% if task.status == "Not Started" %}selected{% endif %}>Not Started</option>
                <option {% if task.status == "In Progress" %}selected{% endif %}>In Progress</option>
                <option {% if task.status == "Completed" %}selected{% endif %}>Completed</option>
            </select>


            <input class="field-tiny" type="number" step="0.01" min="0" max="100" name="grade" value="{{ task.grade }}" placeholder="Grade">

            <textarea class="field-notes" name="notes" placeholder="Notes">{{ task.notes }}</textarea>

            <button type="submit">Save Changes</button>
        </form>

        <div class="cancel-link-container">
            <a href="javascript:history.back()" class="cancel-link">Cancel</a>
        </div>

    </main>
    <script src="/static/dark-mode.js"></script>
</body>
</html>
