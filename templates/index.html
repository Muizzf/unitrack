<!DOCTYPE html>
<html>
  <head>
    <title>UniTrack</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  </head>
  <body>
    <header class="main-header" >
        <h1>UniTrack</h1>
          <button id="darkModeToggle" style="position:absolute; top:20px; right:20px;">🌙</button>
        <p>Select a semester to view your courses and tasks</p>
    </header>

    <a href="/logout" style="position:absolute; top:20px; left:20px;">
      Logout
    </a>

    <div class="container">
      <div class="section-header">
            <h2>Semesters</h2>
      </div>
      <ul class="semester-list">
        {% for s in semesters %}
          <li class = "semester-item">
            <div class="semester-card">
              <a href="/semester/{{ s.id }}" class="semester-name">{{ s.name }}</a>
              <div class="semester-actions">
                <a href="/editSemester/{{ s.id }}" class="edit-link">Edit</a>

                <form
                    action="/deleteSemester/{{ s.id }}"
                    method="POST"
                    style="display:inline;"
                    onsubmit="return confirm('Are you sure you want to delete this semester?');"
                  >
                    <button type="submit" class="delete-btn">Delete</button>
                </form>
              </div>
            </div>
          </li>
        {% endfor %}
      </ul>

    
      <form action="/addSemester" method="POST" class="add-sem">
        <input
          type="text"
          name="semesterName"
          placeholder="Semester name"
          required
        >
        <button type="submit">Add Semester</button>
      </form>
    </div>
    <script src="/static/dark-mode.js"></script>
  </body>
</html>
