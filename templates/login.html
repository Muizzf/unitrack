<!DOCTYPE html>
<html>
<head>
  <title>Login - UniTrack</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
  <header class="main-header">
    <h1>Welcome to UniTrack</h1>
    <button id="darkModeToggle" style="position:absolute; top:20px; right:20px;">🌙</button>
  </header>
  <div>
    <div class="auth-container">
      <h1>Login</h1>

      <form method="POST" action="/login" >
        <input type="email" name="email" placeholder="Email" required>
        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">Login</button>
      </form>

      <p>
        Don't have an account?
        <a href="/register" class="edit-link">Register</a>
      </p>
    </div>
  </div>
  <script src="/static/dark-mode.js"></script>
</body>
</html>
