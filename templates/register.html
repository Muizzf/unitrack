<!DOCTYPE html>
<html>
<head>
  <title>Register - UniTrack</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
  <header class="main-header">
    <h1>Register for UniTrack</h1>
    <button id="darkModeToggle" style="position:absolute; top:20px; right:20px;">🌙</button>
  </header>
  <div class="auth-container">
    <h1>Register</h1>

    <form method="POST" action="/register">
      <input type="email" name="email" placeholder="Email" required>
      <input type="password" name="password" placeholder="Password" required>

      <button type="submit">Create Account</button>
    </form>

    <p>
      Already have an account?
      <a href="/login" class="edit-link">Login</a>
    </p>
  </div>
  <script src="/static/dark-mode.js"></script>
</body>
</html>
